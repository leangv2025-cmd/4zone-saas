name: Deploy 4Zone

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ---- Test & Lint ----
  test:
    name: Test Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package.json
      - run: npm install
      - run: echo "Tests would run here — add Jest or Mocha tests"

  # ---- Deploy Frontend to GitHub Pages (or Cloudflare Pages) ----
  deploy-frontend:
    name: Deploy Frontend
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Cloudflare Pages (optional)
        run: echo "Add Cloudflare Pages action here if using CF"
      # OR deploy to any static host — just upload frontend/public/

  # ---- Deploy Backend to Railway ----
  # Railway auto-deploys when you connect your GitHub repo.
  # No manual step needed here unless you want custom logic.
  deploy-backend:
    name: Backend (Railway Auto-Deploy)
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Notice
        run: echo "Railway auto-deploys from main branch. No manual step needed."
